<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>andrewislearning</title>
<meta name="description" content="30 days of automating content creation with AI. One plugin per day.">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #ffffff;
    color: #111111;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 28px 32px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .wordmark {
    font-size: 14px;
    letter-spacing: -0.01em;
    color: #111;
  }
  .wordmark a { color: inherit; text-decoration: none; }
  .meta { font-size: 12px; color: #888; }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 64px 32px 120px;
    text-align: center;
  }
  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .tagline {
    font-size: 16px;
    color: #555;
    margin: 0 0 64px;
    max-width: 540px;
    margin-left: auto; margin-right: auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 28px;
    justify-items: center;
  }
  .folder {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: inherit;
    padding: 12px;
    border-radius: 10px;
    transition: background 120ms ease, transform 120ms ease;
  }
  .folder:hover {
    background: #f3f3f3;
    transform: translateY(-2px);
  }
  .folder svg {
    width: 88px; height: 70px;
    margin-bottom: 10px;
  }
  .folder .label {
    font-size: 13px;
    color: #222;
  }
  .folder .sub {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  .folder.upcoming {
    opacity: 0.35;
    pointer-events: none;
  }
  footer {
    text-align: center;
    font-size: 11px;
    color: #aaa;
    padding: 32px;
  }
  footer a { color: inherit; }
</style>
</head>
<body>

<header>
  <div class="wordmark"><a href="/">@andrewislearning</a></div>
  <div class="meta">Day 1 of 30</div>
</header>

<main>
  <h1>I'm teaching an AI to be my video editor.</h1>
  <p class="tagline">30 days of automating content creation. One plugin per day, free.</p>

  <div class="grid">
    <a class="folder" href="/days/01.html">
      <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 16 C6 12 9 9 13 9 L40 9 L48 17 L87 17 C91 17 94 20 94 24 L94 66 C94 70 91 73 87 73 L13 73 C9 73 6 70 6 66 Z"
              fill="#9ec1f0" stroke="#5a8ed1" stroke-width="1.2"/>
        <path d="M6 22 L94 22" stroke="#5a8ed1" stroke-width="1" opacity="0.4"/>
      </svg>
      <div class="label">Day 1</div>
      <div class="sub">Series Planner</div>
    </a>
    <!-- Upcoming days appear here as the series rolls. -->
  </div>
</main>

<footer>
  <a href="https://github.com/andrewjiang/andrewislearning">github</a> ·
  <a href="https://instagram.com/andrewislearning">instagram</a>
</footer>

</body>
</html>
